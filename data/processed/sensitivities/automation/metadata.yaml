    description: "Fraction of manufacturing steps that are fully automated"
    unit: "fraction (0-1)"
    baseline: 0.6
    range: [0.4, 0.9]
    notes: "Current best-in-class plants estimated at ~60% automation"

  labor_reduction_factor:
    description: "Multiplicative factor applied to base labor intensity"
    unit: "dimensionless"
    equation: "factor = 1 - 0.7 * (automation_level - baseline_automation)"
    notes: "Each 10% increase in automation reduces labor by ~7% (placeholder estimate)"

