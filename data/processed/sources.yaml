  - id: epi_report
    name: "EPI Report — EV Policy and Workers"
    description: "Economic Policy Institute labor market analysis; policy-driven workforce distribution in battery manufacturing (+150k vs -75k by 2030)"
    provided: true
    processed: false
    raw_file: "data/raw/epi_report.pdf"
    url: "https://www.epi.org/publication/ev-policy-workers/"
    source_type: "labor-economics think tank publication"
    sensitivities: [policy_scenarios, automation, manufacturing_productivity, market_share]
    notes: "\"The stakes for workers...\" (Barrett & Bivens, Sept 2021), with BlueGreen Alliance/AFL-CIO/UAW/USW collaboration. +150k jobs by 2030 if U.S. EV powertrain domestic content rises from 45% to ICE-level (~75%) AND domestic vehicle assembly share rises 10pp (to 60%); -75k jobs if policy inaction stalls both. BEV assembly requires ~30% fewer labor hours than ICE; PHEVs require ~20% more than ICE (temporary buffer). Regional concentration: 54.8% of auto jobs in Upper Midwest, 30.1% in South. Notes union wage premium erosion (60% in late 1980s -> 7% in 2020) and 14% of production workers on temp-agency contracts at depressed wages."
    credibility:
      tier: 4
      rationale: "Respected labor economics research organization with focus on worker welfare and policy impact; uses IMPLAN input-output modeling"

