  - id: ev_labor_intensity_study
    name: "Weng et al. (2024) — Higher labor intensity in US automotive assembly plants after transitioning to electric vehicles"
    description: "Peer-reviewed (Nature Communications) empirical study of labor-intensity changes at US auto assembly plants transitioning to EV production"
    provided: true
    processed: false
    raw_file: "data/raw/ev_labor_intensity_study.pdf"
    url: "https://doi.org/10.1038/s41467-024-52435-x"
    source_type: "peer-reviewed academic journal article (Nature Communications)"
    sensitivities: [manufacturing_productivity]
    notes: "Core primary source for the View A labor-intensity curve. Uses US Quarterly Workforce Indicators (NAICS 3361, county-level) plus plant-level cases (Tesla Alameda steady-state, GM Orion 5-yr transition, Rivian McLean ramp-up). Finding: BEV assembly shows >10x labor intensity during ramp-up and ~3x higher intensity after a decade vs. ICEV baseline; ~15+ years to reach labor-intensity parity. Note: This is assembly labor intensity, NOT cell manufacturing (Stage-5 explicitly distinguishes assembly from cell tier)."
    credibility:
      tier: 3
      rationale: "Peer-reviewed Nature Communications article; underlying data drawn from US Census Bureau Quarterly Workforce Indicators (Tier 1 government data)"

