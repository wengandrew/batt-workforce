## Primary Source Registry
## Status tracking for all research sources identified in the Committee Insights paper.
## Each source should be (a) provided as a raw file and (b) processed into structured data.
##
## Each entry also carries: url, source_type, and credibility: {tier, rationale}.
## Credibility is rated on a 7-tier scale (1 = most credible, 7 = least credible) —
## see data/processed/sources/README.md for the scale and the per-source markdown
## file format (data/processed/sources/<id>.md).

sources:
  - id: mckinsey_research
    name: "McKinsey — Battery 2035: Building New Advantages"
    description: "Industry workforce benchmarks for battery manufacturing, scrap rates in early-stage gigafactories"
    provided: true
    processed: false
    raw_file: "data/raw/mckinsey_research.pdf"
    url: "https://www.mckinsey.com/features/mckinsey-center-for-future-mobility/our-insights/battery-2035-building-new-advantages"
    source_type: "management consultancy research/insights article"
    sensitivities: [manufacturing_productivity, automation, policy_scenarios]
    notes: "January 2026 article (Battery Accelerator Team). Scrap rates during early ramp-up reported as 70-80% (i.e. 20-30% yield), improving to 95%+ within 18 months — higher than the 20-40% figure cited for linkedin_chinese_gigafactory_scrap; cross-check the two before combining. Labor intensity benchmark: 30-40 FTE/GWh. Confirms key claim: operator skills/quality-consistency are decisive, structured training/competency systems recommended (some battery startups failed due to skills deficits). Automation (digital twins, inline metrology, SPC, high-speed stacking, dry electrode coating) shifts workforce toward technical/diagnostic roles. Notes IRA Section 45X and EU localization requirements as cost/capex drivers relevant to policy_scenarios. Used in Stage-5 demand band modeling; distinct from mckinsey_demand_outlook_2025."
    credibility:
      tier: 4
      rationale: "Major management consultancy with deep industry expertise; specific manufacturing claims require verification against primary data"

  - id: ohio_research
    name: "Ohio Governor's Office of Workforce Transformation / OMA — Accelerating Ohio's Auto & Advanced Mobility Workforce (2023)"
    description: "State workforce strategy roadmap (v2.0): EV/battery job projections and regional employer-level breakdowns for Ohio"
    provided: true
    processed: false
    raw_file: "data/raw/ohio_research.pdf"
    url: "https://workforce.ohio.gov"
    source_type: "state government workforce strategy report (co-published with Ohio Manufacturers' Association, developed with Accenture)"
    sensitivities: [manufacturing_productivity, automation, policy_scenarios, market_share]
    notes: "106-page roadmap (v2.0, June 2023) based on 70+ stakeholder interviews. Projects 25,000+ new EV/battery-related jobs in Ohio by 2030 (~30% increase over current automotive workforce), driven by named investments: Honda/LG Energy Solution battery plant (Fayette County, 2,200 jobs), Ford EV plant (Lorain County, 1,800 jobs), SEMCORP separator film facility (1,200 jobs). States battery cell manufacturing requires a greater share of labor hours than ICE powertrains. Flags critical trades/technician skill gaps (e.g. only 156 electrician apprenticeship completions in NE Ohio in 2022) as the bottleneck rather than engineering supply."
    credibility:
      tier: 2
      rationale: "Official state government strategic planning document (Governor's Office of Workforce Transformation) co-published with state trade association (OMA), developed with Accenture; grounded in 70+ stakeholder interviews and facility-level investment tracking"

